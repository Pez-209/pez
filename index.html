<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>leon's links</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple: #9561A0;
      --purple-light: #c497d4;
      --purple-dark: #6b3f7a;
      --purple-glow: rgba(149, 97, 160, 0.35);
      --bg: #0e0a11;
      --card: rgba(149, 97, 160, 0.08);
      --card-border: rgba(149, 97, 160, 0.22);
      --text: #f0e6f5;
      --muted: #b89ec4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Ambient background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(149,97,160,0.18) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: drift 8s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(107,63,122,0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: drift 10s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(3%, 4%) scale(1.05); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
    }

    /* ── Chibi ── */
    .chibi-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      margin-bottom: 0.2rem;
      animation: floatUp 0.7s ease both;
    }
    .chibi-wrap::before {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 18px;
      background: radial-gradient(ellipse, var(--purple-glow) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(4px);
    }
    .chibi {
      width: 130px;
      height: auto;
      filter: drop-shadow(0 0 18px var(--purple-glow));
      animation: bob 4s ease-in-out infinite;
      image-rendering: auto;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    /* ── Name / handle ── */
    .name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, var(--purple-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeIn 0.5s 0.1s ease both;
    }
    .handle {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: -0.6rem;
      animation: fadeIn 0.5s 0.2s ease both;
    }

    /* ── Social cards ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 1.2rem;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      backdrop-filter: blur(6px);
    }
    .link-card:hover {
      transform: translateY(-3px) scale(1.015);
      background: rgba(149,97,160,0.18);
      border-color: var(--purple);
      box-shadow: 0 8px 30px rgba(149,97,160,0.22);
    }
    .link-card:active {
      transform: scale(0.98);
    }

    .icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon svg { width: 22px; height: 22px; }

    .link-info { flex: 1; }
    .link-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .link-user {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .arrow {
      color: var(--purple-light);
      opacity: 0.7;
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.2s;
    }
    .link-card:hover .arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    /* platform icon */
    .plat { background: var(--purple); }

    /* stagger */
    .link-card:nth-child(1) { animation: slideUp 0.45s 0.25s ease both; }
    .link-card:nth-child(2) { animation: slideUp 0.45s 0.35s ease both; }
    .link-card:nth-child(3) { animation: slideUp 0.45s 0.45s ease both; }
    .link-card:nth-child(4) { animation: slideUp 0.45s 0.55s ease both; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes floatUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer {
      margin-top: 0.5rem;
      font-size: 0.72rem;
      color: rgba(184,158,196,0.35);
      letter-spacing: 0.05em;
      animation: fadeIn 1s 1s ease both;
    }
  </style>
</head>

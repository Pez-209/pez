<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>pez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #e8e0d0;
      --muted: #555;
      --hover-bg: #1a1a1a;
      --glow: rgba(232, 224, 208, 0.08);
    }

    body {
      background: var(--bg);
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 20px 80px;
      overflow-x: hidden;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── HERO CARD (Roblox cover) ── */
    .hero {
      width: 100%;
      position: relative;
      border-radius: 20px 20px 0 0;
      overflow: hidden;
      border: 1px solid var(--border);
      border-bottom: none;
      background: #000;
      aspect-ratio: 16/9;
      animation: fadeUp 0.6s ease both;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.85;
      transition: opacity 0.3s;
    }

    .hero:hover img { opacity: 1; }

    .hero-label {
      position: absolute;
      bottom: 14px;
      left: 18px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(232,224,208,0.6);
    }

    .hero-roblox-btn {
      position: absolute;
      bottom: 10px;
      right: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(10,10,10,0.85);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 13px;
      text-decoration: none;
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      transition: background 0.2s, border-color 0.2s;
      backdrop-filter: blur(6px);
    }

    .hero-roblox-btn:hover {
      background: rgba(232,224,208,0.1);
      border-color: rgba(232,224,208,0.3);
    }

    .hero-roblox-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── PROFILE BLOCK ── */
    .profile-block {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      padding: 28px 28px 24px;
      animation: fadeUp 0.7s ease both;
    }

    .name {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .handle {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    /* ── LINKS SECTION ── */
    .links-section {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 20px 20px;
      overflow: hidden;
      animation: fadeUp 0.8s ease both;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 16px 28px 10px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 28px;
      text-decoration: none;
      color: var(--accent);
      transition: background 0.18s;
      position: relative;
      border-top: 1px solid var(--border);
    }

    .link-item:first-of-type { border-top: none; }

    .link-item:hover {
      background: var(--hover-bg);
    }

    .link-item:hover .link-arrow {
      transform: translate(3px, -3px);
      opacity: 1;
    }

    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.18s;
    }

    .link-item:hover .link-icon { background: #2a2a2a; }

    .link-icon svg { width: 18px; height: 18px; }

    .link-text { flex: 1; }
    .link-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
      display: block;
    }
    .link-sub {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      display: block;
      margin-top: 2px;
    }

    .link-arrow {
      font-size: 14px;
      color: var(--muted);
      transition: transform 0.18s, opacity 0.18s;
      opacity: 0.4;
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 28px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      animation: fadeUp 1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
